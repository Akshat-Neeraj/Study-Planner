<!DOCTYPE html>
<html>
<head>
<title>Smart Study Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h1> Smart Study Tracker</h1>
<div class="stats">
<div class="card">
<h3>Total Study Sessions</h3>
<p id="totalTasks">0</p>
</div>
<div class="card">
<h3>Completed</h3>
<p id="completedTasks">0</p>
</div>
<div class="card">
<h3>Total Hours</h3>
<p id="totalHours">0</p>
</div>
</div>
<div class="form">
<h2>Plan Study Sessions</h2>
<input id="subject" placeholder="Subject">
<input id="hours" type="number" placeholder="Hours">
<input id="deadline" type="date">
<button onclick="addTask()">Add Task</button>
<div class="sessionCard">
<h2>Planned Study Sessions</h2>
<div id="taskList"></div>
</div>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
